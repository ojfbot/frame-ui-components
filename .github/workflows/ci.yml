name: CI

on: [push, pull_request]

jobs:
  build:
    name: Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test
